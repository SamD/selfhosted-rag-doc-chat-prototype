# Mosquitto MQTT Broker Configuration
# Private network, single token auth

persistence false
log_dest stdout
log_type all

# Native MQTT listener
listener 1883 0.0.0.0
protocol mqtt

# WebSocket listener (for browser-based dashboards)
listener 9001 0.0.0.0
protocol websockets

# Password file for token-based auth
password_file /mosquitto/config/passwd

# Access control: any authenticated user can read/write agent/*
acl_file /mosquitto/config/acl
