name: '🔀 Gemini Triage'

on:
  workflow_call:
    inputs:
      additional_context:
        type: 'string'
        description: 'Any additional context from the request'
        required: false

jobs:
  triage:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      issues: 'read'
      pull-requests: 'read'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      - name: 'Get repository labels'
        id: 'get_labels'
        uses: 'actions/github-script@v7'
        with:
          script: |-
            const labels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const labelNames = labels.map(l => l.name).sort().join(',');
            core.setOutput('available_labels', labelNames);

      - name: 'Install Stable Gemini CLI'
        run: |
          npm install -g @google/gemini-cli@0.32.0
          mkdir -p "${HOME}/.gemini"
          echo '{"projects":{}}' > "${HOME}/.gemini/projects.json"

      - name: 'Run Triage'
        id: 'gemini_analysis'
        env:
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          ISSUE_TITLE: '${{ github.event.issue.title }}'
          ISSUE_BODY: '${{ github.event.issue.body }}'
          LABELS: '${{ steps.get_labels.outputs.available_labels }}'
        run: |
          # Run the CLI directly to avoid the wrapper action's JSON parsing bugs
          RESULT=$(gemini --quiet prompt "Analyze this GitHub issue and return ONLY a comma-separated list of applicable labels from this list: [$LABELS]. Title: $ISSUE_TITLE. Body: $ISSUE_BODY")
          echo "SELECTED_LABELS=$RESULT" >> $GITHUB_ENV

  label:
    needs: triage
    runs-on: 'ubuntu-latest'
    if: ${{ env.SELECTED_LABELS != '' }}
    permissions:
      issues: 'write'
    steps:
      - name: 'Apply Labels'
        uses: 'actions/github-script@v7'
        with:
          script: |-
            const labels = process.env.SELECTED_LABELS.split(',').map(s => s.trim()).filter(Boolean);
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }