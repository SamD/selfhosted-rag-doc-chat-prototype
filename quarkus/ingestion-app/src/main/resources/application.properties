# Ingestion Application Configuration
# Maps to Python: workers/producer_worker.py, processors/document_processor.py, processors/text_processor.py
#
# This is the producer worker that scans directories for documents,
# extracts text (with OCR fallback), chunks the text, and enqueues to Redis.

quarkus.application.name=ingestion-app

# =============================================================================
# File Processing Configuration
# Used by: workers/producer_worker.py - run_tree_watcher(), ingest_file()
# =============================================================================
# Maps to: INGEST_FOLDER (required) - Directory to watch for new documents
INGEST_FOLDER=/data/ingest

# Maps to: ALL_SUPPORTED_EXT = (".pdf", ".html", ".htm") + SUPPORTED_MEDIA_EXT
SUPPORTED_EXTENSIONS=.pdf,.html,.htm

# Maps to: SUPPORTED_MEDIA_EXT (default: .mp3,.wav,.m4a,.aac,.flac,.mp4,.mov,.mkv)
SUPPORTED_MEDIA_EXT=.mp3,.wav,.m4a,.aac,.flac,.mp4,.mov,.mkv

# =============================================================================
# Directory Watcher Configuration
# Used by: workers/producer_worker.py - run_tree_watcher(scan_interval=30)
# =============================================================================
# Maps to: scan_interval parameter (default: 30 seconds)
# Not a direct env var in Python, but used in run_tree_watcher(scan_interval=30)
app.watcher.scan-interval=30

# =============================================================================
# File Tracking Configuration
# Used by: workers/producer_worker.py - load_tracked(), update_failed_files()
# Used by: utils/file_utils.py
# =============================================================================
# Maps to: FAILED_FILES (default: failed_files.txt)
FAILED_FILES=failed_files.txt

# Maps to: INGESTED_FILE (default: ingested_files.txt)
INGESTED_FILE=ingested_files.txt

# Maps to: TRACK_FILE (default: ingested_files.txt)
TRACK_FILE=ingested_files.txt

# =============================================================================
# Model Paths Configuration
# Used by: workers/producer_worker.py, processors/text_processor.py
# =============================================================================
# Maps to: EMBEDDING_MODEL_PATH (required) - for tokenizer
# Use /tmp for build-time resolution to avoid access denied errors
EMBEDDING_MODEL_PATH=${java.io.tmpdir}/models/embedding
# =============================================================================
# LangChain4j Configuration
# =============================================================================
# Default to ollama for build/test stability. Override to jlama in production for local inference.
quarkus.langchain4j.chat-model.provider=ollama
quarkus.langchain4j.embedding-model.provider=ollama

# jlama Chat Model (local) - Kept for reference and manual activation
# quarkus.langchain4j.jlama.chat-model.provider=jlama
# quarkus.langchain4j.jlama.chat-model.model-id=tjake/Llama-3.2-1B-Instruct-JQ4_K_M-GGUF
# quarkus.langchain4j.jlama.download-models=false

# jlama Embedding Model (local e5-large-v2)
# Config reference: https://docs.quarkiverse.io/quarkus-langchain4j/dev/jlama-embedding-model.html#_configuration_reference
# quarkus.langchain4j.jlama.embedding-model.provider=jlama
# quarkus.langchain4j.jlama.embedding-model.model-name=intfloat/e5-large-v2
# Base directory for models - backs out of the owner/model structure to find the root
# quarkus.langchain4j.jlama.models-path=${EMBEDDING_MODEL_PATH}/../..
# Specific HuggingFace model name
# quarkus.langchain4j.jlama.embedding-model.max-tokens=${MAX_TOKENS}


# =============================================================================
# Text Processing Configuration
# Used by: processors/text_processor.py - split_doc()
# =============================================================================
# Maps to: MAX_TOKENS (default: 512)
MAX_TOKENS=512

# Maps to: MAX_CHROMA_BATCH_SIZE_LIMIT (default: 5461)
MAX_CHROMA_BATCH_SIZE_LIMIT=5461

# =============================================================================
# OCR Configuration
# Used by: workers/producer_worker.py - preprocess_image(), send_image_to_ocr(), fallback_ocr()
# =============================================================================
# Maps to: DEBUG_IMAGE_DIR (default: /tmp/ocr_debug)
DEBUG_IMAGE_DIR=/tmp/ocr_debug

# Maps to: MAX_OCR_DIM (default: 3000) - max dimension before rescaling
MAX_OCR_DIM=3000

# =============================================================================
# Media Processing Configuration (Whisper)
# Used by: workers/producer_worker.py - extract_text_from_media()
# Used by: processors/document_processor.py
# =============================================================================
# Maps to: DEVICE (default: cuda)
DEVICE=cuda

# Maps to: MEDIA_BATCH_SIZE (default: 8) - reduce if low on GPU memory
MEDIA_BATCH_SIZE=8

# Maps to: COMPUTE_TYPE (default: float16) - use int8 if low on GPU memory
COMPUTE_TYPE=float16

# =============================================================================
# Queue Configuration
# Used by: workers/producer_worker.py - blocking_push_with_backpressure(), get_next_queue()
# =============================================================================
# Maps to: QUEUE_NAMES (default: chunk_ingest_queue:0,chunk_ingest_queue:1)
QUEUE_NAMES=chunk_ingest_queue:0,chunk_ingest_queue:1

# Maps to: MAX_QUEUE_LENGTH for backpressure (used in blocking_push_with_backpressure)
MAX_QUEUE_LENGTH=50000

# =============================================================================
# Redis Configuration
# Used by: workers/producer_worker.py - redis_client, send_image_to_ocr()
# =============================================================================
# Maps to: REDIS_HOST, REDIS_PORT
REDIS_HOST=localhost
REDIS_PORT=6380
quarkus.redis.hosts=redis://${REDIS_HOST}:${REDIS_PORT}

# Maps to: REDIS_OCR_JOB_QUEUE (default: ocr_processing_job)
REDIS_OCR_JOB_QUEUE=ocr_processing_job

# =============================================================================
# Worker Configuration
# Used by: workers/producer_worker.py - Pool(processes=min(4, os.cpu_count()))
# =============================================================================
# Maps to: min(4, os.cpu_count()) in run_tree_watcher()
# Not a direct env var, but using a name that makes sense
app.processing.worker-count=4

# =============================================================================
# Text Validation Configuration
# Used by: utils/text_utils.py - is_gibberish(), is_low_quality(), is_bad_ocr()
# =============================================================================
# Maps to: ALLOW_LATIN_EXTENDED (default: true)
ALLOW_LATIN_EXTENDED=true

# Maps to: LATIN_SCRIPT_MIN_RATIO (default: 0.7)
LATIN_SCRIPT_MIN_RATIO=0.7
