# Common configuration shared across all modules
# Maps to Python: config/settings.py
#
# This file contains base configuration that is shared by all microservices.
# Each microservice imports these via its own application.properties.

# =============================================================================
# Redis Configuration
# Used by: services/redis_service.py, workers/producer_worker.py, workers/consumer_worker.py, workers/ocr_worker.py
# =============================================================================
# Maps to: REDIS_HOST (default: localhost)
# Maps to: REDIS_PORT (default: 6380)
quarkus.redis.hosts=redis://localhost:6380

# Maps to: REDIS_OCR_JOB_QUEUE (default: ocr_processing_job)
app.redis.ocr-job-queue=ocr_processing_job

# Maps to: REDIS_INGEST_QUEUE (default: chunk_ingest_queue)
app.redis.ingest-queue=chunk_ingest_queue

# =============================================================================
# Queue Configuration
# Used by: workers/producer_worker.py, workers/consumer_worker.py
# =============================================================================
# Maps to: QUEUE_NAMES (default: chunk_ingest_queue:0,chunk_ingest_queue:1)
app.queue.names=chunk_ingest_queue:0,chunk_ingest_queue:1

# Maps to: MAX_QUEUE_LENGTH (default: 25)
app.queue.max-length=25

# Maps to: POLL_INTERVAL (default: 0.5)
app.queue.poll-interval=0.5

# Maps to: WAIT_WARN_THRESHOLD (default: 10)
app.queue.wait-warn-threshold=10.0

# =============================================================================
# Vector Database Configuration
# Used by: services/database.py, services/database_qdrant_sparse_testing.py
# =============================================================================
# Maps to: VECTOR_DB_PROFILE (default: qdrant)
# When "qdrant", USE_QDRANT=true; otherwise USE_QDRANT=false
app.vectordb.profile=qdrant

# Maps to: VECTOR_DB_HOST (default: vector-db)
app.vectordb.host=vector-db

# Maps to: VECTOR_DB_PORT (default: 6333 for qdrant, 8000 for chroma)
app.vectordb.port=6333

# Maps to: VECTOR_DB_COLLECTION (default: vector_base_collection)
app.vectordb.collection=vector_base_collection

# =============================================================================
# Qdrant Specific Configuration
# Used by: services/database_qdrant_sparse_testing.py
# =============================================================================
# Maps to: QDRANT_RETRIEVER_K (default: 10)
app.qdrant.retriever-k=10

# Maps to: QDRANT_DENSE_WEIGHT (default: 0.3)
app.qdrant.dense-weight=0.3

# Maps to: QDRANT_SPARSE_WEIGHT (default: 0.7)
app.qdrant.sparse-weight=0.7

# =============================================================================
# Processing Configuration
# Used by: workers/consumer_worker.py, processors/text_processor.py
# =============================================================================
# Maps to: CHUNK_TIMEOUT (default: 300) - seconds before buffer is stale
app.processing.chunk-timeout=300

# Maps to: MAX_CHUNKS (default: 20000)
app.processing.max-chunks=20000

# Maps to: MAX_CHROMA_BATCH_SIZE (default: 75)
app.processing.max-batch-size=75

# Maps to: MAX_CHROMA_BATCH_SIZE_LIMIT (default: 5461)
app.processing.max-batch-size-limit=5461

# Maps to: MAX_TOKENS (default: 512)
app.processing.max-tokens=512

# =============================================================================
# Model Paths Configuration
# Used by: services/database.py, processors/text_processor.py, workers/producer_worker.py
# =============================================================================
# Maps to: EMBEDDING_MODEL_PATH (required)
app.model.embedding-path=/models/embedding

# Maps to: LLM_PATH (required for local LLM)
app.model.llm-path=/models/llm

# Maps to: LLAMA_USE_GPU (default: true)
app.model.use-gpu=true

# =============================================================================
# Metrics Configuration
# Used by: utils/metrics.py
# =============================================================================
# Maps to: METRICS_ENABLED (default: true)
app.metrics.enabled=true

# Maps to: METRICS_LOG_FILE (default: metrics.jsonl)
app.metrics.log-file=metrics.jsonl

# Maps to: METRICS_LOG_TO_STDOUT (default: true)
app.metrics.log-to-stdout=true

# =============================================================================
# Text Validation Configuration
# Used by: utils/text_utils.py (for OCR quality checks)
# =============================================================================
# Maps to: ALLOW_LATIN_EXTENDED (default: true)
# When true, treat Latin extended characters (diacritics, ligatures) as valid
app.text.allow-latin-extended=true

# Maps to: LATIN_SCRIPT_MIN_RATIO (default: 0.7)
# Minimum fraction of letters that must be Latin to treat as Latin script
app.text.latin-script-min-ratio=0.7
