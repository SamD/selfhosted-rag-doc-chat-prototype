# Front-end Test Properties
# Switch to ollama for tests to avoid Jlama build-time download issues
quarkus.langchain4j.embedding-model.provider=ollama
quarkus.langchain4j.chat-model.provider=ollama
quarkus.langchain4j.ollama.devservices.enabled=false
quarkus.langchain4j.ollama.embedding-model.model-id=e5-large
quarkus.langchain4j.ollama.chat-model.model-id=llama3

quarkus.langchain4j.qdrant.host=localhost
quarkus.langchain4j.qdrant.port=6333
quarkus.langchain4j.qdrant.collection-name=vector_base_collection

TESSDATA_PREFIX=/tmp
