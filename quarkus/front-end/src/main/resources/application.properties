# Front-end Application Configuration
quarkus.application.name=front-end

# HTTP Server Configuration
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*

# =============================================================================
# LangChain4j Configuration
# =============================================================================
# Default to ollama for build/test stability. Override to jlama in production for local inference.
quarkus.langchain4j.chat-model.provider=ollama
quarkus.langchain4j.embedding-model.provider=ollama

# Jlama Chat Model (local) - Kept for reference and manual activation
# quarkus.langchain4j.jlama.chat-model.provider=jlama
# quarkus.langchain4j.jlama.chat-model.model-id=tjake/Llama-3.2-1B-Instruct-JQ4_K_M-GGUF
# quarkus.langchain4j.jlama.download-models=false

# Embedding Model Configuration
# Path to models (reusing property name from Python for parity)
# Use /tmp for build-time resolution to avoid access denied errors
EMBEDDING_MODEL_PATH=${java.io.tmpdir}/models/embedding
# quarkus.langchain4j.jlama.embedding-model.provider=jlama
# quarkus.langchain4j.jlama.embedding-model.model-name=intfloat/e5-large-v2
# Base directory for models - backs out of the owner/model structure to find the root
# quarkus.langchain4j.jlama.models-path=${EMBEDDING_MODEL_PATH}/../..
# Specific HuggingFace model name
# quarkus.langchain4j.jlama.embedding-model.max-tokens=${MAX_TOKENS}

# Qdrant Embedding Store
quarkus.langchain4j.qdrant.host=vector-db
quarkus.langchain4j.qdrant.port=6333
quarkus.langchain4j.qdrant.collection-name=vector_base_collection
quarkus.langchain4j.qdrant.collection.name=vector_base_collection

# Application specific properties
RETRIEVER_TOP_K=20
LLAMA_TEMPERATURE=0.3
