# Persistence Application Configuration
quarkus.application.name=persistence-app

# =============================================================================
# LangChain4j Configuration
# =============================================================================
# Using Ollama for e5-large embeddings
quarkus.langchain4j.embedding-model.provider=ollama
quarkus.langchain4j.ollama.embedding-model.base-url=http://localhost:11434
quarkus.langchain4j.ollama.embedding-model.model-id=e5-large

# Qdrant Embedding Store
quarkus.langchain4j.qdrant.host=vector-db
quarkus.langchain4j.qdrant.port=6333
quarkus.langchain4j.qdrant.collection-name=vector_base_collection
quarkus.langchain4j.qdrant.collection.name=vector_base_collection

# =============================================================================
# Redis Configuration
# =============================================================================
quarkus.redis.hosts=redis://localhost:6380

# Application specific properties
app.vectordb.host=vector-db
app.vectordb.port=6333
app.vectordb.collection=vector_base_collection
app.model.embedding-path=/models/embedding
app.batch.max-size=75
app.processing.max-tokens=512
app.queue.names=chunk_ingest_queue:0,chunk_ingest_queue:1
