# OCR Fallback Application Configuration
# Maps to Python: workers/ocr_worker.py
#
# This is the OCR worker that consumes image jobs from Redis,
# processes them with Tesseract, and returns the extracted text.

quarkus.application.name=ocr-fallback-app

# =============================================================================
# OCR Worker Configuration
# Used by: workers/ocr_worker.py - main(), Pool(processes=num_workers)
# =============================================================================
# Maps to: num_workers = min(2, os.cpu_count() or 1)
app.ocr.worker-count=2

# =============================================================================
# Tesseract OCR Configuration
# Used by: workers/ocr_worker.py - fallback_to_tesseract()
# =============================================================================
# Maps to: TESSERACT_LANGS (default: eng+lat)
app.ocr.tesseract-langs=eng+lat

# Maps to: TESSERACT_PSM (default: 6) - Page Segmentation Mode
# PSM 6 = Assume a single uniform block of text
app.ocr.tesseract-psm=6

# Maps to: TESSERACT_OEM (default: 1) - OCR Engine Mode
# OEM 1 = Neural nets LSTM engine only
app.ocr.tesseract-oem=1

# Maps to: TESSERACT_USE_SCRIPT_LATIN (default: true)
# When true, adds "-c tessedit_script=Latin" to config
app.ocr.tesseract-use-script-latin=true

# Maps to: TESSDATA_PREFIX (default: "")
# Path to tessdata directory, empty uses system default
app.ocr.tessdata-prefix=

# =============================================================================
# Debug Configuration
# Used by: workers/ocr_worker.py - save_bad_image()
# =============================================================================
# Maps to: DEBUG_IMAGE_DIR (default: /tmp/ocr_debug)
# Directory to save failed OCR images for debugging
app.ocr.debug-image-dir=/tmp/ocr_debug

# =============================================================================
# Redis Configuration
# Used by: workers/ocr_worker.py - dispatcher(), worker_task()
# =============================================================================
# Maps to: REDIS_HOST, REDIS_PORT
quarkus.redis.hosts=redis://localhost:6380

# Maps to: REDIS_OCR_JOB_QUEUE (default: ocr_processing_job)
# Queue from which OCR jobs are consumed (via BRPOP)
app.redis.ocr-job-queue=ocr_processing_job

# =============================================================================
# Text Validation Configuration
# Used by: utils/text_utils.py - is_invalid_text()
# =============================================================================
# Maps to: ALLOW_LATIN_EXTENDED (default: true)
app.text.allow-latin-extended=true

# Maps to: LATIN_SCRIPT_MIN_RATIO (default: 0.7)
app.text.latin-script-min-ratio=0.7

# =============================================================================
# Metrics Configuration
# Used by: utils/metrics.py - JobMetrics
# =============================================================================
# Maps to: METRICS_ENABLED (default: true)
app.metrics.enabled=true

# Maps to: METRICS_LOG_FILE (default: metrics.jsonl)
app.metrics.log-file=metrics.jsonl

# Maps to: METRICS_LOG_TO_STDOUT (default: true)
app.metrics.log-to-stdout=true
