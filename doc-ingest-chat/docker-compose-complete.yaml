name: doc-ingest-chat
services:
  api_gpu_qdrant:
    profiles:
      - cuda-qdrant
    build:
      context: /home/samueldoyle/Projects/GitHub/SamD/selfhosted-rag-doc-chat-prototype/doc-ingest-chat
      dockerfile: Dockerfile.worker
      args:
        TARGET_TYPE: cuda
    command:
      - python
      - apimain.py
    container_name: api_gpu
    depends_on:
      qdrant:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          memory: "34359738368"
        reservations:
          memory: "17179869184"
          devices:
            - capabilities:
                - gpu
                - utility
                - compute
              driver: nvidia
              count: -1
    environment:
      CHUNK_TIMEOUT: "300"
      COMPUTE_TYPE: float16
      DEBUG_IMAGE_DIR: /tmp/ocr_debug
      DEVICE: cuda
      DUCKDB_FILE: /home/samueldoyle/Projects/GitHub/SamD/selfhosted-rag-doc-chat-prototype/Docs/chunks.duckdb
      EMBEDDING_MODEL_PATH: /home/samueldoyle/AI_LOCAL/e5-large-v2
      FAILED_FILES: /home/samueldoyle/Projects/GitHub/SamD/selfhosted-rag-doc-chat-prototype/Docs/failed_files.txt
      INGEST_FOLDER: /home/samueldoyle/Projects/GitHub/SamD/selfhosted-rag-doc-chat-prototype/Docs
      INGESTED_FILE: /home/samueldoyle/Projects/GitHub/SamD/selfhosted-rag-doc-chat-prototype/Docs/ingested_files.txt
      LD_LIBRARY_PATH: /usr/local/cuda/lib64:/usr/local/nvidia/lib64:/usr/lib/x86_64-linux-gnu
      LLAMA_CHAT_FORMAT: chatml
      LLAMA_MAX_TOKENS: "256"
      LLAMA_N_BATCH: "128"
      LLAMA_N_GPU_LAYERS: "35"
      LLAMA_REPEAT_PENALTY: "1.5"
      LLAMA_TEMPERATURE: "0.2"
      LLAMA_TOP_K: "20"
      LLAMA_TOP_P: "0.95"
      LLAMA_USE_GPU: "true"
      LLM_PATH: /home/samueldoyle/AI_LOCAL/Models/Phi/Phi-3.5-mini-instruct-Q4_K_M.gguf
      MAX_CHROMA_BATCH_SIZE: "75"
      MAX_CHROMA_BATCH_SIZE_LIMIT: "5461"
      MAX_CHUNKS: "20000"
      MAX_OCR_DIM: "3000"
      MAX_QUEUE_LENGTH: "25"
      MAX_TOKENS: "512"
      MEDIA_BATCH_SIZE: "8"
      METRICS_ENABLED: "true"
      METRICS_LOG_FILE: /home/samueldoyle/Projects/GitHub/SamD/selfhosted-rag-doc-chat-prototype/Docs/metrics.jsonl
      METRICS_LOG_TO_STDOUT: "true"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      NVIDIA_VISIBLE_DEVICES: all
      OLLAMA_MODEL: NeuralNet/openchat-3.6
      PARQUET_FILE: /home/samueldoyle/Projects/GitHub/SamD/selfhosted-rag-doc-chat-prototype/Docs/chunks.parquet
      POLL_INTERVAL: "0.5"
      PYTHONUNBUFFERED: "1"
      QUEUE_NAMES: chunk_ingest_queue:0,chunk_ingest_queue:1,chunk_ingest_queue:2,chunk_ingest_queue:3
      REDIS_HOST: redis
      REDIS_INGEST_QUEUE: chunk_ingest_queue
