      REDIS_PORT: "6380"
      RETRIEVER_TOP_K: "5"
      SUPERVISOR_LLM_PATH: /home/samueldoyle/AI_LOCAL/Models/Qwen2.5/Qwen2.5-1.5B-Instruct-Q4_K_M.gguf
