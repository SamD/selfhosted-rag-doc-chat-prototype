version: '3.8'

# --- REUSABLE ANCHORS ---

x-base-service: &base-service
  restart: unless-stopped
  env_file:
    - .env
  volumes:
    - .:/app
    - ./.env:/app/.env
    - ${INGEST_FOLDER}:${INGEST_FOLDER}
    - ${DEBUG_IMAGE_DIR:-/tmp/ocr_debug}:${DEBUG_IMAGE_DIR:-/tmp/ocr_debug}
    - ${EMBEDDING_MODEL_PATH}:${EMBEDDING_MODEL_PATH}:ro
    - ${LLM_PATH}:${LLM_PATH}:ro
    - ${SUPERVISOR_LLM_PATH}:${SUPERVISOR_LLM_PATH}:ro

x-gpu-params: &gpu-params
  runtime: nvidia
  shm_size: '2gb'
  build:
    context: .
    dockerfile: Dockerfile.worker
    args:
      TARGET_TYPE: cuda
  environment:
    - LLAMA_USE_GPU=true
    - PYTHONUNBUFFERED=1
    - EMBEDDING_MODEL_PATH=${EMBEDDING_MODEL_PATH}
    - LLM_PATH=${LLM_PATH}
    - SUPERVISOR_LLM_PATH=${SUPERVISOR_LLM_PATH}
    - INGEST_FOLDER=${INGEST_FOLDER}
    - VECTOR_DB_PROFILE=${VECTOR_DB_PROFILE}
    - LD_LIBRARY_PATH=/usr/local/cuda/lib64:/usr/local/nvidia/lib64:/usr/lib/x86_64-linux-gnu
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
  deploy:
    resources:
      limits:
        memory: 32G
      reservations:
        memory: 16G
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu, utility, compute]

x-cpu-params: &cpu-params
  build:
    context: .
    dockerfile: Dockerfile.worker
    args:
      TARGET_TYPE: cpu
  environment:
    - LLAMA_USE_GPU=false
    - PYTHONUNBUFFERED=1
    - EMBEDDING_MODEL_PATH=${EMBEDDING_MODEL_PATH}
    - LLM_PATH=${LLM_PATH}
    - SUPERVISOR_LLM_PATH=${SUPERVISOR_LLM_PATH}
    - INGEST_FOLDER=${INGEST_FOLDER}
    - VECTOR_DB_PROFILE=${VECTOR_DB_PROFILE}

# --- SERVICES ---

services:
  redis:
    image: redis:7
    command: --port ${REDIS_PORT:-6380} --save "" --appendonly no
    ports:
      - "${REDIS_PORT:-6380}:${REDIS_PORT:-6380}"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    env_file:
      - .env

  qdrant:
    image: qdrant/qdrant:latest
    profiles: [qdrant, cuda-qdrant, cpu-qdrant]
    hostname: vector-db
    env_file:
      - .env
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
      - QDRANT__LOG_LEVEL=DEBUG
      - QDRANT__TELEMETRY_DISABLED=true
    ports:
      - "${VECTOR_DB_PORT:-9002}:6333"
      - "${VECTOR_DB_GRPC_PORT:-9003}:6334"
    volumes:
      - "${VECTOR_DB_DATA_DIR:-./Docs/qdrant_data}:/qdrant/storage"
    networks:
      default:
        aliases:
          - vector-db
    restart: unless-stopped
    depends_on:
      - redis

  # --- GPU CONSUMER ---

  consumer_worker_gpu:
    <<: [*base-service, *gpu-params]
    container_name: consumer_worker_gpu
    hostname: consumer_worker
    profiles: [cuda-qdrant]
    command: ["python", "run_consumer.py"]
    depends_on:
      - redis
      - qdrant

  # --- INGESTION PIPELINE (NOW USING GPU PARAMS) ---

  ocr_worker:
    <<: [*base-service, *gpu-params]
    container_name: ocr_worker
    hostname: ocr_worker
    profiles: [cuda]
    command: ["python", "run_ocr_worker.py"]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "run_ocr_worker.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  producer_worker:
    <<: [*base-service, *gpu-params]
    container_name: producer_worker
    hostname: producer_worker
    profiles: [cuda]
    command: ["python", "run_producer.py"]
    depends_on:
      ocr_worker:
        condition: service_healthy

  # --- FRONTEND & API ---

  api_gpu_qdrant:
    <<: [*base-service, *gpu-params]
    container_name: api_gpu
    hostname: api
    profiles: [cuda-qdrant]
    command: ["python", "apimain.py"]
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - qdrant

  frontend:
    build:
      context: ../astro-frontend
      dockerfile: Dockerfile.frontend
      target: dev
    profiles: [with-frontend]
    ports:
      - "4321:4321"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    # Call local astro directly to avoid network checks and version mismatches
    command: ["./node_modules/.bin/astro", "dev", "--host", "0.0.0.0", "--port", "4321"]
    volumes:
      - ../astro-frontend:/app
      - /app/node_modules

volumes:
  redis_data: