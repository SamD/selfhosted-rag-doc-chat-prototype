# --- REUSABLE ANCHORS ---

x-base-service: &base-service
  restart: unless-stopped
  env_file:
    - .env
  volumes:
    - .:/app
    - ./.env:/app/.env
    - ${DEFAULT_DOC_INGEST_ROOT}:${DEFAULT_DOC_INGEST_ROOT}
    - ${STAGING_DIR}:${STAGING_DIR}
    - ${PREPROCESSING_DIR}:${PREPROCESSING_DIR}
    - ${INGESTION_DIR}:${INGESTION_DIR}
    - ${CONSUMING_DIR}:${CONSUMING_DIR}
    - ${SUCCESS_DIR}:${SUCCESS_DIR}
    - ${FAILED_DIR}:${FAILED_DIR}
    - ${EMBEDDING_MODEL_PATH_MOUNT}:${EMBEDDING_MODEL_PATH_MOUNT}:ro
    - ${LLM_PATH_MOUNT}:${LLM_PATH_MOUNT}:ro
    - ${SUPERVISOR_LLM_PATH_MOUNT}:${SUPERVISOR_LLM_PATH_MOUNT}:ro
#  networks:
#    - rag-net

x-gpu-params: &gpu-params
  runtime: nvidia
  shm_size: '2gb'
  build:
    context: ..
    dockerfile: doc-ingest-chat/Dockerfile.worker
    args:
      TARGET_TYPE: cuda
  environment:
    - LLAMA_USE_GPU=true
    - PYTHONUNBUFFERED=1
    - REDIS_HOST=redis
    - REDIS_PORT=${REDIS_PORT:-6379}
    - EMBEDDING_MODEL_PATH=${EMBEDDING_MODEL_PATH}
    - LLM_PATH=${LLM_PATH}
    - SUPERVISOR_LLM_PATH=${SUPERVISOR_LLM_PATH}
    - DEFAULT_DOC_INGEST_ROOT=${DEFAULT_DOC_INGEST_ROOT}
    - STAGING_DIR=${STAGING_DIR}
    - PREPROCESSING_DIR=${PREPROCESSING_DIR}
    - INGESTION_DIR=${INGESTION_DIR}
    - CONSUMING_DIR=${CONSUMING_DIR}
    - SUCCESS_DIR=${SUCCESS_DIR}
    - FAILED_DIR=${FAILED_DIR}
    - VECTOR_DB_PROFILE=${VECTOR_DB_PROFILE}
    - LD_LIBRARY_PATH=/usr/local/cuda/lib64:/usr/local/nvidia/lib64:/usr/lib/x86_64-linux-gnu
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility

services:
  redis:
    image: redis:7
    command: --port ${REDIS_PORT:-6379} --save "" --appendonly no
#    networks:
#      - rag-net
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    env_file:
      - .env

  qdrant:
    image: qdrant/qdrant:latest
    profiles: [qdrant, cuda-qdrant, cpu-qdrant]
    env_file:
      - .env
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
      - QDRANT__LOG_LEVEL=DEBUG
      - QDRANT__TELEMETRY_DISABLED=true
    ports:
      - "${VECTOR_DB_PORT:-9002}:6333"
      - "${VECTOR_DB_GRPC_PORT:-9003}:6334"
    volumes:
      - "${VECTOR_DB_DATA_DIR:-./Docs/qdrant_data}:/qdrant/storage"
    networks:
      default:
        aliases:
          - vector-db
    restart: unless-stopped
    depends_on:
      - redis

  consumer_worker_gpu:
    <<: [*base-service, *gpu-params]
    container_name: consumer_worker_gpu
    profiles: [cuda-qdrant]
    command: ["python", "run_consumer.py"]
    depends_on:
      - redis
      - qdrant

  ocr_worker:
    <<: [*base-service, *gpu-params]
    container_name: ocr_worker
    profiles: [cuda]
    command: ["python", "run_ocr_worker.py"]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "run_ocr_worker.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  gatekeeper_worker:
    <<: [*base-service, *gpu-params]
    container_name: gatekeeper_worker
    profiles: [cuda]
    command: ["python", "run_gatekeeper.py"]
    depends_on:
      ocr_worker:
        condition: service_healthy

  producer_worker:
    <<: [*base-service, *gpu-params]
    container_name: producer_worker
    profiles: [cuda]
    command: ["python", "run_producer.py"]
    depends_on:
      ocr_worker:
        condition: service_healthy

  api_gpu_qdrant:
    <<: [*base-service, *gpu-params]
    container_name: api_gpu
    profiles: [cuda-qdrant]
    command: ["python", "apimain.py"]
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - qdrant

  frontend:
    build:
      context: ../astro-frontend
      dockerfile: Dockerfile.frontend
      target: dev
    profiles: [with-frontend]
    ports:
      - "4321:4321"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    command: ["./node_modules/.bin/astro", "dev", "--host", "0.0.0.0", "--port", "4321"]
    volumes:
      - ../astro-frontend:/app
      - /app/node_modules
      - /app/.astro
#    networks:
#      - rag-net

volumes:
  redis_data:

